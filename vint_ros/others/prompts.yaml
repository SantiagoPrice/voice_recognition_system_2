        NEAR/FAR vs CLOSE/DISTANT:
        • "Near" or "close to me" + right/left  → Scenario 2 (Right Near Edge / Left Near Edge)
        • "Far" or "back" + right/left          → Scenario 2 (Right Far Edge / Left Far Edge)
        • "Near" or "far" WITHOUT right/left    → I don't know (ambiguous)
        • "Close" or "Distant" alone            → Scenario 1 only

        SLIGHT SHIFTS WITH DIRECTION:
        • "shift slightly to the right"         → Right Near Edge (implies staying close)
        • "shift slightly to the left"          → Left Near Edge (implies staying close)
        • "shift right" alone                   → Right Edge (Scenario 1)

        FEELING/COMFORT WORDS:
        These never map to an edge alone. If the ONLY cue is a feeling word
        (calming, spacious, comfortable, stable, natural, easy, right) → I don't know.
        A feeling word PLUS a clear direction is acceptable.
        Examples:
        • "the far side feels calming"          → I don't know (feeling + vague direction)
        • "the right side feels calming"        → Right Edge (feeling + clear direction)

        WIDE VIEW / PERSPECTIVE:
        • "wide view", "broad view", "see more" → I don't know (not a named edge)

